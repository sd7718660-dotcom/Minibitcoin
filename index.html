<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>MINIBITCOIN - EARNING & INVESTMENT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --gold: #ffd700; --bg: #050505; --card: #121212; --border: #222; --red: #ff4444; --muted:#888; --waiting:#ffae00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .allow-select { user-select: text !important; cursor: text; }

        header { background: #000; padding: 15px; border-bottom: 2px solid var(--gold); text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(255, 215, 0, 0.1); }
        .header-title { color: var(--gold); font-weight: 800; font-size: 0.95rem; margin: 0; letter-spacing: 0.5px; text-transform: uppercase; }
        .header-sub { color: var(--accent); font-size: 0.7rem; display: block; margin-top: 2px; }
        .menu-btn { position: absolute; right: 20px; top: 18px; color: var(--gold); font-size: 1.4rem; cursor: pointer; }

        .tabs { display: flex; gap:8px; margin: 12px; background: #111; border-radius: 12px; border:1px solid var(--border); padding:6px; align-items:center; }
        .tab { flex: 1; padding: 10px; border: none; background: none; color: var(--muted); font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: 0.2s; text-align:center; border-radius:10px; }
        .tab.active { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent); }

        #app-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 15px; padding: 10px 12px 90px 12px; }

        .card { background: var(--card); border-radius: 18px; border:1px solid var(--border); overflow: hidden; position: relative; }
        .card-body { padding: 16px; }
        .card-footer { padding:14px; }

        .btn-main { width:100%; padding:14px; border-radius:12px; border:none; font-weight:900; font-size:1rem; cursor:pointer; transition:0.2s; text-transform:uppercase; letter-spacing:0.5px; }
        .btn-join { background:var(--accent); color:#000; box-shadow:0 0 15px rgba(0,255,136,0.2); }
        .btn-join:active { transform:scale(0.98); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; display:none; align-items:center; justify-content:center; padding:15px; backdrop-filter: blur(5px); }
        .modal-ui { background:#111; width:100%; max-width:480px; padding:25px; border-radius:20px; border:1px solid var(--gold); color:#fff; position:relative; box-shadow: 0 0 30px rgba(255,215,0,0.15); }
        input, textarea, select { width:100%; background:#050505; border:1px solid #333; color:#fff; padding:12px; border-radius:10px; font-family:'Poppins'; outline:none; margin-bottom:10px; }
        input:focus { border-color:var(--accent); }

        #side-menu { position: fixed; top:0; right:-100%; width:300px; height:100%; background:#0a0a0a; z-index:5000; transition:0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left:1px solid var(--gold); display:flex; flex-direction:column; }
        #side-menu.active { right:0; box-shadow: -10px 0 50px rgba(0,0,0,0.8); }
        .menu-header { padding:20px; border-bottom:1px solid #222; display:flex; align-items:center; gap:15px; background:#000; }
        .menu-dp { width:50px; height:50px; border-radius:50%; object-fit:cover; border:2px solid var(--gold); }
        .menu-items { padding:10px; overflow-y:auto; flex:1; }
        .menu-link { display:flex; align-items:center; gap:15px; padding:16px; color:#ddd; text-decoration:none; border-bottom:1px solid #1a1a1a; font-weight:600; font-size:0.95rem; transition:0.2s; cursor:pointer; }
        .menu-link:hover { background:#111; color:var(--accent); padding-left:20px; }
        .menu-link i { width:25px; text-align:center; color:var(--gold); }
        .close-menu { position:absolute; top:15px; right:15px; color:var(--red); font-size:1.8rem; cursor:pointer; }
        .menu-footer { padding:20px; border-top:1px solid #222; text-align:center; background:#000; }
        .premium-btn { background: linear-gradient(45deg, #ffd700, #b8860b); color:#000; border:none; padding:12px; width:100%; border-radius:30px; font-weight:bold; margin-top:10px; cursor:pointer; }

        .stats-box { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
        .stat-item { background:#0b0b0b; padding:10px 5px; border-radius:10px; border:1px solid #222; text-align:center; }
        .stat-lbl { font-size:0.6rem; color:#888; text-transform:uppercase; display:block; margin-bottom:4px; font-weight:700; }
        .stat-val { font-size:1rem; font-weight:800; }
        .st-gold { color:var(--gold); font-size:1.1rem; }
        .st-green { color:var(--accent); }

        .profile-head { background: linear-gradient(180deg, #1a1a1a, #050505); padding:20px; border-radius:16px; text-align:center; border:1px solid #333; position:relative; margin-bottom:20px; }
        .p-img-cont { position:relative; width:80px; height:80px; margin:0 auto 10px; }
        .p-img { width:100%; height:100%; border-radius:50%; object-fit:cover; border:2px solid var(--accent); }
        .p-edit { position:absolute; bottom:0; right:0; background:var(--gold); color:#000; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.8rem; cursor:pointer; border:2px solid #000; }

        .item { display:flex; gap:10px; align-items:center; margin-bottom:10px; }
        .item i { color: var(--gold); font-size:1rem; width:20px; text-align:center; }
        .item div span { display:block; font-size:0.6rem; color:var(--muted); text-transform:uppercase; }
        .item div b { font-size:0.95rem; color:#fff; }

        @keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none} }
    </style>
</head>
<body>
    <header>
        <p class="header-title">MINIBITCOIN EARNING PLATFORM</p>
        <span class="header-sub">INVEST & EARN REAL MONEY 💰</span>
        <div class="menu-btn" onclick="toggleMenu(true)"><i class="fas fa-bars-staggered"></i></div>
    </header>

    <div id="tabs-container" class="tabs" style="display:none;">
        <button class="tab active" onclick="switchTab(event, 'investments')">INVESTMENTS</button>
        <button class="tab" onclick="switchTab(event, 'profile')">MY PROFILE</button>
        <button class="tab" onclick="switchTab(event, 'earnings')">EARNINGS</button>
        <button class="tab" onclick="switchTab(event, 'wallet')">WALLET</button>
    </div>

    <div id="side-menu">
        <div class="close-menu" onclick="toggleMenu(false)">&times;</div>
        <div class="menu-header">
            <img id="menu-dp" src="https://img.icons8.com/color/96/user-male-circle.png" class="menu-dp" alt="User">
            <div>
                <div id="menu-name" style="font-weight:bold; color:#fff;">Guest</div>
                <div id="menu-balance" style="font-size:0.7rem; color:var(--accent);">Bal: ₹0</div>
            </div>
        </div>
        <div class="menu-items">
            <a class="menu-link" onclick="switchTab(event, 'investments'); toggleMenu(false)"><i class="fas fa-chart-line"></i> Investments</a>
            <a class="menu-link" onclick="switchTab(event, 'profile'); toggleMenu(false)"><i class="fas fa-user"></i> My Profile</a>
            <a class="menu-link" onclick="switchTab(event, 'earnings'); toggleMenu(false)"><i class="fas fa-money-bill"></i> Earnings</a>
            <a class="menu-link" onclick="switchTab(event, 'wallet'); toggleMenu(false)"><i class="fas fa-wallet"></i> Wallet</a>
        </div>
        <div class="menu-footer">
            <div style="font-size:0.7rem; color:#555; margin-bottom:10px;">Secure Platform • Real Earnings<br>© 2026 MINIBITCOIN</div>
            <button id="logout-btn" onclick="logout()" class="premium-btn" style="background:#222; color:var(--red); display:none;">LOGOUT</button>
            <button id="login-btn" onclick="openAuthModal()" class="premium-btn">LOGIN / REGISTER</button>
        </div>
    </div>

    <main id="app-content"></main>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal">
        <div class="modal-ui">
            <h2 id="auth-title" style="color:var(--gold); text-align:center; margin-bottom:20px;">LOGIN</h2>
            
            <div id="login-form">
                <input type="text" id="login-phone" placeholder="Enter Phone Number" maxlength="10">
                <input type="password" id="login-password" placeholder="Enter Password">
                <button class="btn-main btn-join" onclick="handleLogin()">LOGIN</button>
                <p style="text-align:center; font-size:0.8rem; margin-top:15px; color:#888; cursor:pointer;" onclick="switchAuthMode()">
                    New user? <span style="color:var(--accent); font-weight:bold;">Register Here</span>
                </p>
            </div>

            <div id="register-form" style="display:none;">
                <input type="text" id="reg-phone" placeholder="Phone Number (10 digits)" maxlength="10">
                <input type="text" id="reg-name" placeholder="Full Name">
                <input type="text" id="reg-gaming-name" placeholder="Gaming Name">
                <input type="text" id="reg-gaming-id" placeholder="Gaming ID / UID">
                <input type="text" id="reg-upi" placeholder="UPI ID (e.g., user@paytm)">
                <input type="password" id="reg-password" placeholder="Create Password">
                <button class="btn-main btn-join" onclick="handleRegister()">REGISTER</button>
                <p style="text-align:center; font-size:0.8rem; margin-top:15px; color:#888; cursor:pointer;" onclick="switchAuthMode()">
                    Already registered? <span style="color:var(--accent); font-weight:bold;">Login Here</span>
                </p>
            </div>

            <button onclick="closeAuthModal()" style="position:absolute; top:15px; right:15px; background:none; border:none; color:#555; font-size:1.5rem;">&times;</button>
        </div>
    </div>

    <script>
        // Local Storage Management
        const users = JSON.parse(localStorage.getItem('users')) || {};
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;

        // Initialize
        window.addEventListener('load', () => {
            if (currentUser) {
                showLoggedInUI();
                renderInvestments();
            } else {
                document.getElementById('app-content').innerHTML = '<div style="padding:20px; text-align:center;"><p style="color:var(--gold); font-size:1.2rem; margin-bottom:20px;">Welcome to MINIBITCOIN</p><p style="color:#888;">Please login or register to continue</p></div>';
            }
        });

        function toggleMenu(show) {
            const menu = document.getElementById('side-menu');
            if (show) menu.classList.add('active');
            else menu.classList.remove('active');
        }

        function openAuthModal() {
            document.getElementById('auth-modal').style.display = 'flex';
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('auth-title').textContent = 'LOGIN';
        }

        function closeAuthModal() {
            document.getElementById('auth-modal').style.display = 'none';
        }

        function switchAuthMode() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const title = document.getElementById('auth-title');
            
            if (loginForm.style.display === 'block') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                title.textContent = 'REGISTER';
            } else {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                title.textContent = 'LOGIN';
            }
        }

        function handleRegister() {
            const phone = document.getElementById('reg-phone').value.trim();
            const name = document.getElementById('reg-name').value.trim();
            const gamingName = document.getElementById('reg-gaming-name').value.trim();
            const gamingId = document.getElementById('reg-gaming-id').value.trim();
            const upi = document.getElementById('reg-upi').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            if (!phone || !name || !gamingName || !gamingId || !upi || !password) {
                alert('❌ Please fill all fields!');
                return;
            }

            if (phone.length !== 10 || isNaN(phone)) {
                alert('❌ Phone number must be 10 digits!');
                return;
            }

            if (users[phone]) {
                alert('❌ This phone number is already registered!');
                return;
            }

            users[phone] = {
                phone,
                name,
                gamingName,
                gamingId,
                upi,
                password,
                balance: 0,
                totalProfit: 0,
                totalLoss: 0,
                investments: [],
                earnings: [],
                createdAt: new Date().toISOString()
            };

            localStorage.setItem('users', JSON.stringify(users));
            currentUser = users[phone];
            localStorage.setItem('currentUser', JSON.stringify(currentUser));

            alert('✅ Registration successful! Welcome ' + name);
            closeAuthModal();
            showLoggedInUI();
            renderInvestments();
        }

        function handleLogin() {
            const phone = document.getElementById('login-phone').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!phone || !password) {
                alert('❌ Please enter phone and password!');
                return;
            }

            if (!users[phone]) {
                alert('❌ User not found! Please register first.');
                return;
            }

            if (users[phone].password !== password) {
                alert('❌ Wrong password!');
                return;
            }

            currentUser = users[phone];
            localStorage.setItem('currentUser', JSON.stringify(currentUser));

            alert('✅ Login successful! Welcome ' + currentUser.name);
            closeAuthModal();
            showLoggedInUI();
            renderInvestments();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            location.reload();
        }

        function showLoggedInUI() {
            document.getElementById('tabs-container').style.display = 'flex';
            document.getElementById('menu-name').textContent = currentUser.name;
            document.getElementById('menu-balance').textContent = 'Bal: ₹' + currentUser.balance.toFixed(2);
            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'block';
        }

        function switchTab(e, tab) {
            if (e) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
            }
            
            if (!currentUser) {
                alert('Please login first!');
                openAuthModal();
                return;
            }

            switch(tab) {
                case 'investments': renderInvestments(); break;
                case 'profile': renderProfile(); break;
                case 'earnings': renderEarnings(); break;
                case 'wallet': renderWallet(); break;
            }
        }

        function renderInvestments() {
            let html = '<div class="stats-box"><div class="stat-item"><span class="stat-lbl">Total Invested</span><div class="stat-val st-gold">₹' + (currentUser.investments.reduce((sum, inv) => sum + inv.amount, 0)).toFixed(2) + '</div></div><div class="stat-item"><span class="stat-lbl">Active Plans</span><div class="stat-val st-green">' + currentUser.investments.length + '</div></div><div class="stat-item"><span class="stat-lbl">Total Profit</span><div class="stat-val st-gold">₹' + currentUser.totalProfit.toFixed(2) + '</div></div></div>';
            
            html += '<div class="card"><div class="card-body"><h3 style="color:var(--gold); margin:0 0 15px 0;">INVESTMENT PLANS</h3>';
            html += '<div class="item"><i class="fas fa-gem"></i><div><span>Silver Plan</span><b>₹1000 - 5% ROI/Month</b></div></div>';
            html += '<div class="item"><i class="fas fa-crown"></i><div><span>Gold Plan</span><b>₹5000 - 10% ROI/Month</b></div></div>';
            html += '<div class="item"><i class="fas fa-star"></i><div><span>Platinum Plan</span><b>₹10000 - 15% ROI/Month</b></div></div>';
            html += '</div></div>';

            document.getElementById('app-content').innerHTML = html;
        }

        function renderProfile() {
            let html = '<div class="card"><div class="profile-head"><div class="p-img-cont"><img src="https://img.icons8.com/color/96/user-male-circle.png" class="p-img"></div><h3 style="margin:10px 0 0 0; color:var(--gold);">' + currentUser.name + '</h3><p style="margin:5px 0; color:var(--accent); font-size:0.9rem;">@' + currentUser.gamingName + '</p></div>';
            
            html += '<div class="stats-box"><div class="stat-item"><span class="stat-lbl">Gaming ID</span><div class="stat-val" style="color:var(--gold);">' + currentUser.gamingId + '</div></div><div class="stat-item"><span class="stat-lbl">Phone</span><div class="stat-val">+91 ' + currentUser.phone + '</div></div><div class="stat-item"><span class="stat-lbl">UPI ID</span><div class="stat-val" style="color:var(--accent);">' + currentUser.upi + '</div></div></div>';
            
            html += '<div class="stats-box"><div class="stat-item"><span class="stat-lbl">Balance</span><div class="stat-val st-gold">₹' + currentUser.balance.toFixed(2) + '</div></div><div class="stat-item"><span class="stat-lbl">Total Profit</span><div class="stat-val st-green">₹' + currentUser.totalProfit.toFixed(2) + '</div></div><div class="stat-item"><span class="stat-lbl">Total Loss</span><div class="stat-val" style="color:var(--red);">₹' + currentUser.totalLoss.toFixed(2) + '</div></div></div>';
            
            html += '</div>';

            document.getElementById('app-content').innerHTML = html;
        }

        function renderEarnings() {
            let html = '<div class="card"><div class="card-body"><h3 style="color:var(--gold); margin:0 0 15px 0;">EARNINGS HISTORY</h3>';
            
            if (currentUser.earnings.length === 0) {
                html += '<p style="text-align:center; color:#888;">No earnings yet. Start investing to earn!</p>';
            } else {
                currentUser.earnings.forEach(earning => {
                    html += '<div style="background:#0b0b0b; padding:12px; border-radius:10px; margin-bottom:10px; border-left:3px solid var(--gold);"><div style="display:flex; justify-content:space-between;"><span style="color:var(--muted); font-size:0.8rem;">' + earning.date + '</span><span style="color:var(--accent); font-weight:bold;">+₹' + earning.amount.toFixed(2) + '</span></div><p style="margin:5px 0; font-size:0.9rem;">' + earning.type + '</p></div>';
                });
            }
            
            html += '</div></div>';

            document.getElementById('app-content').innerHTML = html;
        }

        function renderWallet() {
            let html = '<div class="card"><div class="card-body"><h3 style="color:var(--gold); margin:0 0 15px 0;">WALLET</h3>';
            html += '<div style="background:linear-gradient(135deg, #ffd70015, #00ff8815); padding:20px; border-radius:12px; border:1px solid var(--border); text-align:center; margin-bottom:20px;"><p style="margin:0; color:var(--muted); font-size:0.8rem;">AVAILABLE BALANCE</p><h2 style="margin:10px 0; color:var(--gold); font-size:2rem;">₹' + currentUser.balance.toFixed(2) + '</h2></div>';
            html += '<button class="btn-main btn-join" onclick="alert(\'Add Fund feature coming soon!\')"><i class="fas fa-plus"></i> ADD FUND</button>';
            html += '<button class="btn-main" style="background:#222; color:#fff; margin-top:10px;" onclick="alert(\'Withdraw feature coming soon!\')"><i class="fas fa-arrow-down"></i> WITHDRAW</button>';
            html += '</div></div>';

            document.getElementById('app-content').innerHTML = html;
        }
    </script>
</body>
</html>
