<!DOCTYPE html><html lang="en">
<head>
    <meta charset="utf-8" />
    <title>EARN MONEY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --gold: #ffd700; --bg: #050505; --card: #121212; --border: #222; --red: #ff4444; --muted:#888; --waiting:#ffae00; --glass: rgba(20,20,20,0.95); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .allow-select, .room-data b { user-select: text !important; cursor: text; }

        header { background: #000; padding: 15px; border-bottom: 2px solid var(--gold); text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(255, 215, 0, 0.1); }
        .header-title { color: var(--gold); font-weight: 800; font-size: 0.95rem; margin: 0; letter-spacing: 0.5px; text-transform: uppercase; }
        .header-sub { color: var(--accent); font-size: 0.7rem; display: block; margin-top: 2px; }
        .menu-btn { position: absolute; right: 20px; top: 18px; color: var(--gold); font-size: 1.4rem; cursor: pointer; }

        .tabs { display: flex; gap:8px; margin: 12px; background: #111; border-radius: 12px; border:1px solid var(--border); padding:6px; align-items:center; }
        .tab { flex: 1; padding: 10px; border: none; background: none; color: var(--muted); font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: 0.2s; text-align:center; border-radius:10px; }
        .tab.active { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent); }

        #app-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 15px; padding: 10px 12px 90px 12px; }

        .card { background: var(--card); border-radius: 18px; border:1px solid var(--border); overflow: hidden; position: relative; transition: transform 0.2s; }
        .m-tag { position: absolute; top: 12px; right: 15px; font-size: 0.65rem; background:#000; padding:4px 8px; border:1px solid var(--accent); border-radius:6px; color:var(--accent); font-weight:800; }
        .card-body { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items:center; }
        .item { display:flex; gap:10px; align-items:center; }
        .item i { color: var(--gold); font-size:1rem; width:20px; text-align:center; }
        .item div span { display:block; font-size:0.6rem; color:var(--muted); text-transform:uppercase; }
        .item div b { font-size:0.95rem; color:#fff; }
        .win-green { color: var(--accent); }
        .entry-gold { color: var(--gold); }

        .timer-box { background:#080808; padding:10px; text-align:center; border-top:1px solid #222; border-bottom:1px solid #222; }
        .countdown { font-family: monospace; font-size:1.2rem; color:var(--waiting); font-weight:900; }

        .card-footer { padding:14px; }
        .slots { display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:8px; font-weight:800; }
        .bar { height:8px; background:#222; border-radius:12px; overflow:hidden; }
        .fill { height:100%; background:linear-gradient(90deg, var(--accent), #008f4c); transition:1s ease; }

        .btn-main { width:100%; padding:14px; border-radius:12px; border:none; font-weight:900; font-size:1rem; cursor:pointer; text-transform:uppercase; }
        .btn-join { background:var(--accent); color:#000; }

        #side-menu { position: fixed; top:0; right:-100%; width:300px; height:100%; background:#0a0a0a; z-index:5000; transition:0.4s; border-left:1px solid var(--gold); display:flex; flex-direction:column; }
        #side-menu.active { right:0; }
        .menu-header { padding:20px; border-bottom:1px solid #222; display:flex; align-items:center; gap:15px; background:#000; }
        .menu-dp { width:50px; height:50px; border-radius:50%; border:2px solid var(--gold); }
        .menu-link { display:flex; align-items:center; gap:15px; padding:16px; color:#ddd; text-decoration:none; border-bottom:1px solid #1a1a1a; font-weight:600; }
        .close-menu { position:absolute; top:15px; right:15px; color:var(--red); font-size:1.8rem; cursor:pointer; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; display:none; align-items:center; justify-content:center; padding:15px; backdrop-filter: blur(5px); }
        .modal-ui { background:#111; width:100%; max-width:480px; padding:25px; border-radius:20px; border:1px solid var(--gold); color:#fff; position:relative; }
        .pay-opt { display:flex; align-items:center; gap:15px; padding:12px; background:#1a1a1a; border-radius:12px; text-decoration:none; color:#fff; margin-bottom:10px; }
        input { width:100%; background:#050505; border:1px solid #333; color:#fff; padding:12px; border-radius:10px; margin-bottom:10px; }

        .stats-box { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
        .stat-item { background:#0b0b0b; padding:10px 5px; border-radius:10px; border:1px solid #222; text-align:center; }
        .stat-lbl { font-size:0.6rem; color:#888; text-transform:uppercase; display:block; margin-bottom:4px; }
        .stat-val { font-size:1rem; font-weight:800; }
    </style>
</head>
<body>

<header>
    <p class="header-title">KALA BAZAR EARNING</p>
    <span class="header-sub">COMPLETE TASKS & EARN REAL CASH 💸</span>
    <div class="menu-btn" onclick="toggleMenu(true)"><i class="fas fa-bars-staggered"></i></div>
</header>

<div class="tabs">
    <button class="tab active" id="tab-live" onclick="switchTab('live')">ACTIVE TASKS</button>
    <button class="tab" id="tab-my" onclick="switchTab('my')">MY EARNINGS</button>
    <button class="tab" id="tab-result" onclick="switchTab('result')">PAYOUTS</button>
</div>

<div id="side-menu">
    <div class="close-menu" onclick="toggleMenu(false)">&times;</div>
    <div class="menu-header">
        <img id="menu-user-dp" src="https://img.icons8.com/color/96/user-male-circle.png" class="menu-dp">
        <div>
            <div id="menu-user-name" style="font-weight:bold; color:#fff;">Guest User</div>
            <div id="menu-user-bal-side" style="font-size:0.7rem; color:var(--accent);">Wallet: ₹0.00</div>
        </div>
    </div>
    <div class="menu-items">
        <a href="#" class="menu-link" onclick="location.reload()"><i class="fas fa-home"></i> Dashboard</a>
        <a href="#" class="menu-link" onclick="openAuthModal('login')"><i class="fas fa-sign-in-alt"></i> Login/Register</a>
    </div>
</div>

<main id="app-content"></main>

<div id="wallet-modal" class="modal">
    <div class="modal-ui">
        <h3 style="color:var(--gold); text-align:center;">MANAGE WALLET</h3>
        <input type="number" id="manual-amt" placeholder="Amount">
        <button class="btn-main btn-join" onclick="initWalletDeposit()">DEPOSIT</button>
        <button onclick="document.getElementById('wallet-modal').style.display='none'" style="width:100%; background:none; color:#555; margin-top:10px; border:none;">CLOSE</button>
    </div>
</div>

<div id="pay-modal" class="modal">
    <div class="modal-ui">
        <h3 style="color:var(--gold); text-align:center;">VERIFY TASK</h3>
        <h1 id="modal-amt" style="color:var(--accent); text-align:center;">₹0</h1>
        <label>Proof of Task (Screenshot)</label>
        <input type="file" id="utr-ss" accept="image/*">
        <input type="text" id="utr-input" placeholder="Task Reference ID">
        <button class="btn-main btn-join" onclick="processPayment()">SUBMIT FOR REVIEW</button>
        <button onclick="closeModal()" style="width:100%; background:none; color:#555; border:none; margin-top:10px;">CANCEL</button>
    </div>
</div>

<div id="auth-modal" class="modal">
    <div class="modal-ui">
        <h2 id="auth-title" style="text-align:center; color:var(--gold);">LOGIN</h2>
        <div id="auth-forms"></div>
        <button id="auth-submit-btn" class="btn-main btn-join" onclick="submitAuth()">CONTINUE</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, query, where, orderBy, getDoc, doc, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBvObxADcAior6R_or9O6UmWsFT8do1GkI", 
        authDomain: "sqladmin-ff04d.firebaseapp.com", 
        projectId: "sqladmin-ff04d", 
        storageBucket: "sqladmin-ff04d.firebasestorage.app", 
        messagingSenderId: "539086978850", 
        appId: "1:539086978850:web:261e6a0cf3c9a2aa29ef7b" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentUser = JSON.parse(localStorage.getItem('user'));

    window.switchTab = (tab) => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+tab).classList.add('active');
        if(tab === 'live') loadTasks();
        if(tab === 'my') loadProfile();
        if(tab === 'result') loadPayouts();
    };

    const loadTasks = () => {
        onSnapshot(collection(db, "matches"), (snap) => {
            const main = document.getElementById('app-content');
            main.innerHTML = '';
            snap.forEach(doc => {
                const task = doc.data();
                main.innerHTML += `
                <div class="card">
                    <span class="m-tag">HOT TASK</span>
                    <div class="card-body">
                        <div class="item"><i class="fas fa-tasks"></i><div><span>Task Name</span><b>${task.map}</b></div></div>
                        <div class="item"><i class="fas fa-coins"></i><div><span>Reward</span><b class="win-green">₹${task.winPrize}</b></div></div>
                        <div class="item"><i class="fas fa-info-circle"></i><div><span>Platform</span><b>${task.type}</b></div></div>
                        <div class="item"><i class="fas fa-lock"></i><div><span>Entry Fee</span><b class="entry-gold">₹${task.entryFee}</b></div></div>
                    </div>
                    <div class="timer-box"><div class="countdown">ENDS SOON</div></div>
                    <div class="card-footer">
                        <button class="btn-main btn-join" onclick="openTask('${doc.id}', ${task.entryFee})">JOIN & EARN</button>
                    </div>
                </div>`;
            });
        });
    };

    window.openTask = (id, fee) => {
        if(!currentUser) return openAuthModal('login');
        document.getElementById('modal-amt').innerText = '₹' + fee;
        document.getElementById('pay-modal').style.display = 'flex';
        window.activeTaskId = id;
    };

    window.processPayment = async () => {
        const utr = document.getElementById('utr-input').value;
        if(utr.length < 5) return alert("Invalid Task ID");
        // Logic for submission...
        alert("Task submitted for verification!");
        closeModal();
    };

    window.closeModal = () => { document.getElementById('pay-modal').style.display = 'none'; };
    window.toggleMenu = (s) => { document.getElementById('side-menu').classList.toggle('active', s); };

    loadTasks();
</script>
</body></html>
